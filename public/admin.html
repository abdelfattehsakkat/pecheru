<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#023e8a" />
  <title>FishCall — Admin 🎣</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* Admin-specific styles */
    .nav-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--gray300); margin-bottom: 20px; flex-wrap: wrap; }
    .nav-tab  { padding: 10px 16px; border: none; background: none; cursor: pointer; font-size: .9rem;
                font-weight: 600; color: var(--gray500); border-bottom: 3px solid transparent;
                margin-bottom: -2px; transition: color .2s, border-color .2s; }
    .nav-tab.active { color: var(--ocean); border-bottom-color: var(--ocean); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .action-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .item-row { display: flex; align-items: center; gap: 10px; background: var(--gray100);
                padding: 10px 12px; border-radius: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .item-row .species-name { font-weight: 700; color: var(--deep); flex: 1; min-width: 120px; }
    .item-row .item-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--deep), var(--ocean)); }
    #login-box { background: var(--white); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,.25); }
    #login-box h2 { margin-bottom: 20px; color: var(--deep); text-align: center; }
  </style>
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen">
    <div id="login-box">
      <h2>🎣 FishCall Admin</h2>
      <div class="form-group">
        <label>Mot de passe</label>
        <input class="form-control" id="pwd-input" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="login-error" style="color:var(--danger);font-size:.9rem;margin-bottom:10px;display:none"></div>
      <button class="btn btn-primary" style="width:100%" onclick="login()">Se connecter</button>
    </div>
  </div>

  <!-- App (hidden until authenticated) -->
  <div id="app-shell" style="display:none">
    <header class="page-header">
      <div class="container">
        <div>
          <h1>🎣 FishCall — Dashboard</h1>
          <p class="subtitle">Panneau de gestion</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <a href="/" class="btn btn-secondary btn-sm">Voir la page publique</a>
          <button class="btn btn-secondary btn-sm" onclick="logout()">Déconnexion</button>
        </div>
      </div>
    </header>

    <main class="container">
      <!-- Tabs -->
      <div class="nav-tabs">
        <button class="nav-tab active" onclick="showTab('tab-catches')">🎣 Pêches</button>
        <button class="nav-tab"        onclick="showTab('tab-friends')">👥 Amis</button>
        <button class="nav-tab"        onclick="showTab('tab-reservations')">📋 Réservations</button>
      </div>

      <!-- ── TAB: CATCHES ──────────────────────────────────────────────── -->
      <div id="tab-catches" class="tab-panel active">
        <div class="action-bar">
          <button class="btn btn-primary" onclick="openCatchModal()">+ Nouvelle pêche</button>
        </div>
        <div id="catches-list">
          <div class="empty-state"><div class="emoji">⏳</div><p>Chargement…</p></div>
        </div>
      </div>

      <!-- ── TAB: FRIENDS ──────────────────────────────────────────────── -->
      <div id="tab-friends" class="tab-panel">
        <div class="action-bar">
          <button class="btn btn-primary" onclick="openFriendModal()">+ Ajouter un ami</button>
        </div>
        <div id="friends-list">
          <div class="empty-state"><div class="emoji">⏳</div><p>Chargement…</p></div>
        </div>
      </div>

      <!-- ── TAB: RESERVATIONS ─────────────────────────────────────────── -->
      <div id="tab-reservations" class="tab-panel">
        <div id="reservations-list">
          <div class="empty-state"><div class="emoji">⏳</div><p>Chargement…</p></div>
        </div>
      </div>
    </main>
  </div>

  <!-- ── Toast ────────────────────────────────────────────────────────────── -->
  <div id="toast"></div>

  <!-- ── Catch modal ──────────────────────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="catch-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="catch-modal-title">Nouvelle pêche</h3>
        <button class="modal-close" onclick="closeCatchModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="cm-id">
        <div class="form-group">
          <label>Titre *</label>
          <input class="form-control" id="cm-title" placeholder="ex : Pêche du 24 mai - Kelibia">
        </div>
        <div class="form-row cols-2">
          <div class="form-group">
            <label>Lieu</label>
            <input class="form-control" id="cm-location" placeholder="ex : Kelibia">
          </div>
          <div class="form-group">
            <label>Photo</label>
            <input class="form-control" id="cm-photo-file" type="file" accept="image/*"
                   onchange="uploadPhoto(this,'cm-photo-url')">
          </div>
        </div>
        <div class="form-group">
          <label>Note / message</label>
          <textarea class="form-control" id="cm-note" rows="3" placeholder="Un mot pour les amis…"></textarea>
        </div>
        <input type="hidden" id="cm-photo-url">
        <div id="cm-photo-preview" style="margin-top:8px"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCatchModal()">Annuler</button>
        <button class="btn btn-primary" onclick="saveCatch()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- ── Fish item modal ──────────────────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="item-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="item-modal-title">Ajouter une espèce</h3>
        <button class="modal-close" onclick="closeItemModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="im-id">
        <input type="hidden" id="im-catch-id">
        <div class="form-row cols-2">
          <div class="form-group">
            <label>Espèce *</label>
            <input class="form-control" id="im-species" placeholder="ex : Dorade royale">
          </div>
          <div class="form-group">
            <label>Unité *</label>
            <select class="form-control" id="im-unit">
              <option value="unit">Unité (poissons)</option>
              <option value="kg">Kilogrammes</option>
              <option value="lot">Lot entier</option>
            </select>
          </div>
        </div>
        <div class="form-row cols-2">
          <div class="form-group">
            <label>Quantité totale *</label>
            <input class="form-control" id="im-qty" type="number" min="0.1" step="0.5" placeholder="ex : 10">
          </div>
          <div class="form-group">
            <label>Prix (DT) <span style="font-weight:400;color:var(--gray500)">optionnel</span></label>
            <input class="form-control" id="im-price" type="number" min="0" step="0.5"
                   placeholder="ex : 8 (par unité/kg ou le lot)">
          </div>
        </div>
        <input type="hidden" id="im-photo-url">
        <div class="form-group">
            <label>Photo (optionnel)</label>
            <input class="form-control" id="im-photo-file" type="file" accept="image/*"
                   onchange="uploadPhoto(this,'im-photo-url')">
          </div>
        <div id="im-photo-preview" style="margin-top:8px"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeItemModal()">Annuler</button>
        <button class="btn btn-primary" onclick="saveItem()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- ── Friend modal ─────────────────────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="friend-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="friend-modal-title">Ajouter un ami</h3>
        <button class="modal-close" onclick="closeFriendModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="fm-id">
        <div class="form-group">
          <label>Nom *</label>
          <input class="form-control" id="fm-name" placeholder="Prénom et nom">
        </div>
        <div class="form-row cols-2">
          <div class="form-group">
            <label>Téléphone</label>
            <input class="form-control" id="fm-phone" type="tel" placeholder="+216 XX XXX XXX">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input class="form-control" id="fm-email" type="email" placeholder="ami@example.com">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeFriendModal()">Annuler</button>
        <button class="btn btn-primary" onclick="saveFriend()">Enregistrer</button>
      </div>
    </div>
  </div>

  <script>
  // ──────────────────────────────────────────────────────────────────────────
  // Utilities
  // ──────────────────────────────────────────────────────────────────────────
  const $ = (sel) => document.querySelector(sel);

  let toastTimer;
  function showToast(msg, type = '') {
    const t = $('#toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 3200);
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function api(method, path, body) {
    const opts = { method, headers: {} };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    const res = await fetch('/api/admin' + path, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }

  function showTab(id) {
    document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
    $(  `#${id}`).classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(el => {
      if (el.getAttribute('onclick') === `showTab('${id}')`) el.classList.add('active');
    });
    if (id === 'tab-catches')      loadCatches();
    if (id === 'tab-friends')      loadFriends();
    if (id === 'tab-reservations') loadReservations();
  }

  // ──────────────────────────────────────────────────────────────────────────
  // Auth
  // ──────────────────────────────────────────────────────────────────────────
  async function checkAuth() {
    try {
      await api('GET', '/me');
      showApp();
    } catch {
      // not authenticated — show login
    }
  }

  async function login() {
    const pwd = $('#pwd-input').value;
    try {
      await api('POST', '/login', { password: pwd });
      showApp();
    } catch (e) {
      $('#login-error').textContent = e.message;
      $('#login-error').style.display = 'block';
    }
  }

  async function logout() {
    await fetch('/api/admin/logout', { method: 'POST' });
    location.reload();
  }

  function showApp() {
    $('#login-screen').style.display = 'none';
    $('#app-shell').style.display = 'block';
    loadCatches();
  }

  $('#pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  // ──────────────────────────────────────────────────────────────────────────
  // CATCHES
  // ──────────────────────────────────────────────────────────────────────────
  let catchesData = [];

  async function loadCatches() {
    try {
      const data = await api('GET', '/catches');
      catchesData = data.catches;
      renderCatches(data.catches);
    } catch (e) { showToast(e.message, 'error'); }
  }

  function renderCatches(catches) {
    const el = $('#catches-list');
    if (!catches.length) {
      el.innerHTML = `<div class="empty-state"><div class="emoji">🎣</div><p>Aucune pêche pour l'instant.</p></div>`;
      return;
    }
    el.innerHTML = catches.map(c => `
      <div class="card" id="catch-card-${c.id}">
        <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <span>${esc(c.title)} <span class="badge badge-${c.status}">${statusLabel(c.status)}</span></span>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${c.status === 'draft' ? `
              <button class="btn btn-success btn-sm" onclick="publishCatch(${c.id})">📢 Publier</button>
              <button class="btn btn-secondary btn-sm" onclick="openCatchModal(${c.id})">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteCatch(${c.id})">🗑️</button>
            ` : c.status === 'published' ? `
              <button class="btn btn-warning btn-sm" onclick="archiveCatch(${c.id})">📦 Archiver</button>
            ` : ''}
          </div>
        </div>
        <div class="card-body">
          ${c.location ? `<p style="color:var(--gray500);font-size:.85rem;margin-bottom:8px">📍 ${esc(c.location)}</p>` : ''}
          <div id="items-${c.id}" style="margin-bottom:12px">
            <div style="color:var(--gray500);font-size:.85rem">Chargement des espèces…</div>
          </div>
          ${c.status !== 'archived' ? `<button class="btn btn-secondary btn-sm" onclick="openItemModal(${c.id})">+ Ajouter une espèce</button>` : ''}
        </div>
      </div>
    `).join('');

    catches.forEach(c => loadCatchDetails(c.id));
  }

  async function loadCatchDetails(catchId) {
    try {
      const data = await api('GET', `/catch/${catchId}`);
      renderCatchItems(catchId, data.items, data.reservations, data.catch.status);
    } catch {}
  }

  function renderCatchItems(catchId, items, reservations, status) {
    const el = $(`#items-${catchId}`);
    if (!el) return;
    if (!items.length) {
      el.innerHTML = `<p style="color:var(--gray500);font-size:.85rem;font-style:italic">Aucune espèce ajoutée.</p>`;
      return;
    }

    const itemsHtml = items.map(item => {
      const p = item.total_quantity ? Math.round((item.remaining / item.total_quantity) * 100) : 0;
      const lowClass = p < 25 ? 'low' : '';
      return `
        <div class="item-row">
          <div class="species-name">${esc(item.species)}</div>
          <div style="font-size:.85rem;color:var(--gray700);min-width:120px">
            ${item.remaining}/${item.total_quantity} ${unitLabel(item.unit_type)}
            ${item.price ? `<span style="color:var(--coral);font-weight:600;margin-left:6px">${item.price} DT/${item.unit_type === 'lot' ? 'lot' : item.unit_type === 'kg' ? 'kg' : 'u.'}</span>` : ''}
            <div class="stock-bar" style="margin:4px 0">
              <div class="stock-bar-fill ${p===0?'empty':lowClass}" style="width:${p}%"></div>
            </div>
          </div>
          <div class="item-actions">
            ${status !== 'archived' ? `
              <button class="btn btn-secondary btn-sm" onclick="openItemModal(${catchId}, ${item.id})">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteItem(${item.id}, ${catchId})">🗑️</button>
            ` : ''}
          </div>
        </div>`;
    }).join('');

    const resHtml = reservations && reservations.length ? `
      <details style="margin-top:10px">
        <summary style="cursor:pointer;color:var(--ocean);font-weight:600;font-size:.9rem">
          📋 ${reservations.length} réservation(s) active(s)
        </summary>
        <div class="table-wrap" style="margin-top:8px">
          <table>
            <thead><tr><th>Nom</th><th>Tél.</th><th>Espèce</th><th>Qté</th><th>Heure</th><th></th></tr></thead>
            <tbody>${reservations.map(r => `
              <tr>
                <td>${esc(r.friend_name)}</td>
                <td>${esc(r.friend_phone)}</td>
                <td>${esc(r.species)}</td>
                <td>${r.quantity} ${unitLabel(r.unit_type)}</td>
                <td>${fmtDate(r.reserved_at)}</td>
                <td><button class="btn btn-danger btn-sm" onclick="cancelRes(${r.id}, ${catchId})">Libérer</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </details>` : '';

    el.innerHTML = itemsHtml + resHtml;
  }

  async function publishCatch(id) {
    if (!confirm('Publier cette pêche ? Les notifications seront envoyées.')) return;
    try {
      await api('POST', `/catch/${id}/publish`);
      showToast('Pêche publiée ! Notifications envoyées.', 'success');
      loadCatches();
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function archiveCatch(id) {
    if (!confirm('Archiver cette pêche ?')) return;
    try {
      await api('PUT', `/catch/${id}/archive`);
      showToast('Pêche archivée.', 'success');
      loadCatches();
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function deleteCatch(id) {
    if (!confirm('Supprimer définitivement cette pêche ?')) return;
    try {
      await api('DELETE', `/catch/${id}`);
      showToast('Pêche supprimée.', 'success');
      loadCatches();
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function cancelRes(resId, catchId) {
    try {
      await api('DELETE', `/reservation/${resId}`);
      showToast('Réservation libérée.', 'success');
      loadCatchDetails(catchId);
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ── Catch modal ───────────────────────────────────────────────────────────
  function openCatchModal(id) {
    $('#cm-id').value = id || '';
    $('#cm-title').value = '';
    $('#cm-location').value = '';
    $('#cm-note').value = '';
    $('#cm-photo-url').value = '';
    $('#cm-photo-preview').innerHTML = '';

    if (id) {
      const c = catchesData.find(x => x.id === id);
      if (c) {
        $('#catch-modal-title').textContent = 'Modifier la pêche';
        $('#cm-title').value    = c.title    || '';
        $('#cm-location').value = c.location || '';
        $('#cm-note').value     = c.note     || '';
        $('#cm-photo-url').value = c.photo_url || '';
        if (c.photo_url) $('#cm-photo-preview').innerHTML = `<img src="${esc(c.photo_url)}" style="max-height:100px;border-radius:6px">`;
      }
    } else {
      $('#catch-modal-title').textContent = 'Nouvelle pêche';
    }
    $('#catch-modal').classList.remove('hidden');
  }

  function closeCatchModal() { $('#catch-modal').classList.add('hidden'); }

  async function saveCatch() {
    const id    = $('#cm-id').value;
    const body  = {
      title:     $('#cm-title').value.trim(),
      location:  $('#cm-location').value.trim() || undefined,
      note:      $('#cm-note').value.trim()     || undefined,
      photo_url: $('#cm-photo-url').value       || undefined,
    };
    if (!body.title) { showToast('Le titre est obligatoire.', 'error'); return; }
    try {
      if (id) await api('PUT', `/catch/${id}`, body);
      else    await api('POST', '/catch', body);
      closeCatchModal();
      showToast('Pêche enregistrée.', 'success');
      loadCatches();
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ── Item modal ────────────────────────────────────────────────────────────
  let currentItemCatchId = null;

  function openItemModal(catchId, itemId) {
    currentItemCatchId = catchId;
    $('#im-id').value       = itemId || '';
    $('#im-catch-id').value = catchId;
    $('#im-species').value  = '';
    $('#im-unit').value     = 'unit';
    $('#im-qty').value      = '';
    $('#im-price').value    = '';
    $('#im-photo-url').value = '';
    $('#im-photo-preview').innerHTML = '';

    if (itemId) {
      $('#item-modal-title').textContent = 'Modifier l\'espèce';
      api('GET', `/catch/${catchId}`)
        .then(data => {
          const item = data.items.find(i => i.id === itemId);
          if (item) {
            $('#im-species').value = item.species || '';
            $('#im-unit').value    = item.unit_type || 'unit';
            $('#im-qty').value     = item.total_quantity || '';
            $('#im-price').value   = item.price || '';
            $('#im-photo-url').value = item.photo_url || '';
            if (item.photo_url) $('#im-photo-preview').innerHTML = `<img src="${esc(item.photo_url)}" style="max-height:100px;border-radius:6px">`;
          }
        }).catch(() => {});
    } else {
      $('#item-modal-title').textContent = 'Ajouter une espèce';
    }
    $('#item-modal').classList.remove('hidden');
  }

  function closeItemModal() { $('#item-modal').classList.add('hidden'); }

  async function saveItem() {
    const id      = $('#im-id').value;
    const catchId = $('#im-catch-id').value;
    const priceVal = parseFloat($('#im-price').value);
    const body    = {
      species:        $('#im-species').value.trim(),
      unit_type:      $('#im-unit').value,
      total_quantity: parseFloat($('#im-qty').value),
      price:          isNaN(priceVal) ? undefined : priceVal,
      photo_url:      $('#im-photo-url').value || undefined,
    };
    if (!body.species || !body.total_quantity) {
      showToast('Espèce et quantité obligatoires.', 'error'); return;
    }
    try {
      if (id) await api('PUT', `/item/${id}`, body);
      else    await api('POST', `/catch/${catchId}/item`, body);
      closeItemModal();
      showToast('Espèce enregistrée.', 'success');
      loadCatchDetails(parseInt(catchId, 10));
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function deleteItem(itemId, catchId) {
    if (!confirm('Supprimer cette espèce ?')) return;
    try {
      await api('DELETE', `/item/${itemId}`);
      showToast('Espèce supprimée.', 'success');
      loadCatchDetails(catchId);
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ── File upload ───────────────────────────────────────────────────────────
  async function uploadPhoto(input, targetId) {
    if (!input.files[0]) return;
    const formData = new FormData();
    formData.append('file', input.files[0]);

    try {
      const res = await fetch('/api/admin/upload', { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      $(`#${targetId}`).value = data.url;
      const previewId = targetId.replace('-url', '-preview');
      $(`#${previewId}`).innerHTML = `<img src="${esc(data.url)}" style="max-height:100px;border-radius:6px;margin-top:6px">`;
    } catch (e) { showToast('Erreur upload : ' + e.message, 'error'); }
  }

  // ──────────────────────────────────────────────────────────────────────────
  // FRIENDS
  // ──────────────────────────────────────────────────────────────────────────
  async function loadFriends() {
    try {
      const data = await api('GET', '/friends');
      renderFriends(data.friends);
    } catch (e) { showToast(e.message, 'error'); }
  }

  function renderFriends(friends) {
    const el = $('#friends-list');
    if (!friends.length) {
      el.innerHTML = `<div class="empty-state"><div class="emoji">👥</div><p>Aucun ami enregistré.</p></div>`;
      return;
    }
    el.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nom</th><th>Téléphone</th><th>Email</th><th>Push</th><th></th></tr></thead>
          <tbody>${friends.map(f => `
            <tr>
              <td>${esc(f.name)}</td>
              <td>${esc(f.phone || '—')}</td>
              <td>${esc(f.email || '—')}</td>
              <td>${f.push_subscription ? '🔔 Oui' : '—'}</td>
              <td>
                <button class="btn btn-secondary btn-sm" onclick="openFriendModal(${f.id})">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="deleteFriend(${f.id})">🗑️</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  let friendsData = [];
  async function openFriendModal(id) {
    if (id) {
      try { const d = await api('GET', '/friends'); friendsData = d.friends; } catch {}
    }
    const f = id ? friendsData.find(x => x.id === id) : null;
    $('#fm-id').value    = id || '';
    $('#fm-name').value  = f ? f.name  || '' : '';
    $('#fm-phone').value = f ? f.phone || '' : '';
    $('#fm-email').value = f ? f.email || '' : '';
    $('#friend-modal-title').textContent = id ? 'Modifier l\'ami' : 'Ajouter un ami';
    $('#friend-modal').classList.remove('hidden');
  }

  function closeFriendModal() { $('#friend-modal').classList.add('hidden'); }

  async function saveFriend() {
    const id   = $('#fm-id').value;
    const body = {
      name:  $('#fm-name').value.trim(),
      phone: $('#fm-phone').value.trim() || undefined,
      email: $('#fm-email').value.trim() || undefined,
    };
    if (!body.name) { showToast('Le nom est obligatoire.', 'error'); return; }
    try {
      if (id) await api('PUT', `/friend/${id}`, body);
      else    await api('POST', '/friend', body);
      closeFriendModal();
      showToast('Ami enregistré.', 'success');
      loadFriends();
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function deleteFriend(id) {
    if (!confirm('Supprimer cet ami ?')) return;
    try {
      await api('DELETE', `/friend/${id}`);
      showToast('Ami supprimé.', 'success');
      loadFriends();
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ──────────────────────────────────────────────────────────────────────────
  // RESERVATIONS
  // ──────────────────────────────────────────────────────────────────────────
  async function loadReservations() {
    try {
      const data = await api('GET', '/reservations');
      renderReservations(data.reservations);
    } catch (e) { showToast(e.message, 'error'); }
  }

  function renderReservations(reservations) {
    const el = $('#reservations-list');
    if (!reservations.length) {
      el.innerHTML = `<div class="empty-state"><div class="emoji">📋</div><p>Aucune réservation active.</p></div>`;
      return;
    }
    el.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Pêche</th><th>Espèce</th><th>Nom</th><th>Téléphone</th><th>Quantité</th><th>Heure</th><th></th></tr></thead>
          <tbody>${reservations.map(r => `
            <tr>
              <td>${esc(r.catch_title)}</td>
              <td>${esc(r.species)}</td>
              <td>${esc(r.friend_name)}</td>
              <td>${esc(r.friend_phone)}</td>
              <td>${r.quantity} ${unitLabel(r.unit_type)}</td>
              <td>${fmtDate(r.reserved_at)}</td>
              <td><button class="btn btn-danger btn-sm" onclick="cancelResGlobal(${r.id})">Libérer</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  async function cancelResGlobal(resId) {
    try {
      await api('DELETE', `/reservation/${resId}`);
      showToast('Réservation libérée.', 'success');
      loadReservations();
    } catch (e) { showToast(e.message, 'error'); }
  }

  // ──────────────────────────────────────────────────────────────────────────
  // Helpers
  // ──────────────────────────────────────────────────────────────────────────
  function statusLabel(s) {
    return s === 'draft' ? 'Brouillon' : s === 'published' ? 'Publiée' : 'Archivée';
  }

  function unitLabel(u) {
    return u === 'kg' ? 'kg' : u === 'lot' ? 'lot(s)' : 'unité(s)';
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('fr-FR', { dateStyle: 'short', timeStyle: 'short' });
  }

  // ──────────────────────────────────────────────────────────────────────────
  // Init
  // ──────────────────────────────────────────────────────────────────────────
  checkAuth();
  </script>
</body>
</html>
