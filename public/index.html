<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0077b6" />
  <title>FishCall 🎣</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="page-header">
    <div class="container">
      <div>
        <h1>🎣 FishCall</h1>
        <p class="subtitle">Les prises fraîches de Wael Ridene</p>
      </div>
      <button id="push-btn" class="btn btn-secondary btn-sm" style="display:none">
        🔔 Activer les notifs
      </button>
    </div>
  </div>
  <div class="page-header-wave">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 32" preserveAspectRatio="none">
      <path fill="#dff3fc" d="M0,18 C180,30 360,6 540,18 C720,30 900,6 1080,18 C1260,30 1400,8 1440,18 L1440,32 L0,32 Z"/>
    </svg>
  </div>
</header>

  <main class="container" id="app">
    <!-- Content injected by JS -->
    <div class="empty-state">
      <div class="emoji">⏳</div>
      <p>Chargement…</p>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
  // ──────────────────────────────────────────────────────────────────────────
  // Utilities
  // ──────────────────────────────────────────────────────────────────────────
  const $ = (sel, ctx = document) => ctx.querySelector(sel);
  const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

  let toastTimer;
  function showToast(msg, type = '') {
    const t = $('#toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = '', 3000);
  }

  function qtyLabel(item, qty) {
    if (item.unit_type === 'unit') return `${qty} poisson${qty > 1 ? 's' : ''} restant${qty > 1 ? 's' : ''}`;
    if (item.unit_type === 'kg')   return `${qty} kg restant${qty > 1 ? 's' : ''}`;
    return qty > 0 ? 'Lot disponible' : 'Lot épuisé';
  }

  function priceLabel(item) {
    if (!item.price) return '';
    if (item.unit_type === 'unit') return `${item.price} DT / unité`;
    if (item.unit_type === 'kg')   return `${item.price} DT / kg`;
    return `${item.price} DT le lot`;
  }

  function calcTotal(item, qty) {
    if (!item.price || item.unit_type === 'lot') return null;
    return (item.price * qty).toFixed(2);
  }

  function pct(item) {
    if (!item.total_quantity) return 0;
    return Math.round((item.remaining / item.total_quantity) * 100);
  }

  // ──────────────────────────────────────────────────────────────────────────
  // Render
  // ──────────────────────────────────────────────────────────────────────────
  const app = $('#app');
  let currentCatch = null;
  let currentItems = [];

  function render(catchData, items) {
    currentCatch = catchData;
    currentItems = items;

    if (!catchData || items.length === 0) {
      app.innerHTML = `
        <div class="empty-state">
          <div class="emoji">🎣</div>
          <p>Pas encore de pêche aujourd'hui…<br>
             Reviens bientôt !</p>
        </div>`;
      return;
    }

    const photoHtml = catchData.photo_url
      ? `<img src="${catchData.photo_url}" alt="Photo de pêche" class="hero-photo">`
      : '';

    const noteHtml = catchData.note
      ? `<p class="catch-note">${esc(catchData.note)}</p>`
      : '';

    const itemsHtml = items.map(item => renderFishCard(item)).join('');

    app.innerHTML = `
      ${photoHtml}
      ${noteHtml}
      <div class="fish-grid" id="fish-grid">${itemsHtml}</div>`;
  }

  function renderFishCard(item) {
    const isEmpty = item.remaining <= 0;
    const photoHtml = item.photo_url
      ? `<img src="${esc(item.photo_url)}" alt="${esc(item.species)}">`
      : `<div class="fish-placeholder">🐟</div>`;

    return `
      <div class="fish-card" id="fish-card-${item.id}">
        ${photoHtml}
        <div class="fish-body">
          <div class="fish-name">${esc(item.species)}</div>
          ${item.price ? `<div class="fish-price">${priceLabel(item)}</div>` : ''}
          ${isEmpty
            ? `<button class="btn btn-secondary btn-sm" disabled style="margin-top:auto">Épuisé 🚫</button>`
            : `<button class="btn btn-coral btn-sm" id="reserve-btn-${item.id}"
                       style="margin-top:auto"
                       onclick="toggleForm(${item.id})">
                 Je réserve 🎣
               </button>`}
          <div class="reserve-form" id="reserve-form-${item.id}">
            <div class="form-group">
              <label>Votre nom</label>
              <input class="form-control" id="rname-${item.id}" type="text"
                     placeholder="Prénom et nom" autocomplete="name">
            </div>
            <div class="form-group">
              <label>Téléphone</label>
              <input class="form-control" id="rphone-${item.id}" type="tel"
                     placeholder="+216 XX XXX XXX" autocomplete="tel">
            </div>
            <div class="form-group">
              <label>${item.unit_type === 'kg' ? 'Quantité (kg)' : item.unit_type === 'lot' ? 'Quantité (lot)' : 'Quantité (unités)'}</label>
              <input class="form-control" id="rqty-${item.id}"
                     type="number" min="0.1" step="${item.unit_type === 'kg' ? '0.5' : '1'}"
                     value="${item.unit_type === 'kg' ? '0.5' : '1'}"
                     oninput="updateTotal(${item.id})">
            </div>
            ${item.price ? `<div id="rtotal-${item.id}" style="font-weight:700;color:var(--coral);font-size:1rem;margin-bottom:8px"></div>` : ''}
            <div class="reserve-error" id="reserve-error-${item.id}"></div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-success btn-sm" onclick="submitReservation(${item.id})">
                ✅ Confirmer
              </button>
              <button class="btn btn-secondary btn-sm" onclick="toggleForm(${item.id})">
                Annuler
              </button>
            </div>
            <div class="reserve-confirm" id="reserve-confirm-${item.id}"></div>
          </div>
        </div>
      </div>`;
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function attachReserveListeners() {} // noop — using inline handlers

  function toggleForm(itemId) {
    const form = $(`#reserve-form-${itemId}`);
    form.classList.toggle('open');
    if (form.classList.contains('open')) updateTotal(itemId);
  }

  function updateTotal(itemId) {
    const item = currentItems.find(i => i.id === itemId);
    if (!item || !item.price) return;
    const qty = parseFloat($(`#rqty-${itemId}`)?.value || 0);
    const totalEl = $(`#rtotal-${itemId}`);
    if (!totalEl) return;
    const t = calcTotal(item, qty);
    totalEl.textContent = t ? `Total estimé : ${t} DT` : '';
  }

  async function submitReservation(itemId) {
    const name  = $(`#rname-${itemId}`).value.trim();
    const phone = $(`#rphone-${itemId}`).value.trim();
    const qty   = parseFloat($(`#rqty-${itemId}`).value);
    const errEl = $(`#reserve-error-${itemId}`);

    errEl.style.display = 'none';

    if (!name || !phone || !qty || qty <= 0) {
      errEl.textContent = 'Merci de remplir tous les champs.';
      errEl.style.display = 'block';
      return;
    }

    try {
      const res = await fetch('/api/reserve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fish_item_id: itemId, friend_name: name, friend_phone: phone, quantity: qty }),
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error || 'Erreur lors de la réservation.';
        errEl.style.display = 'block';
        return;
      }

      // Show confirmation
      const item = currentItems.find(i => i.id === itemId);
      const total = item ? calcTotal(item, qty) : null;
      const confirmEl = $(`#reserve-confirm-${itemId}`);
      confirmEl.innerHTML = `✅ Réservé${total ? ` — Total : <strong>${total} DT</strong>` : ''} ! Wael Ridene te contactera pour la récupération.`;
      confirmEl.style.display = 'block';
      // Update stock display inline
      if (item) {
        item.remaining = Math.max(0, item.remaining - qty);
        const p = pct(item);
        $(`#qty-label-${itemId}`).textContent = item.remaining <= 0 ? '🚫 Épuisé' : qtyLabel(item, item.remaining);
        $(`#stock-bar-${itemId}`).style.width = p + '%';
        if (item.remaining <= 0) $(`#stock-bar-${itemId}`).classList.add('empty');
      }
    } catch {
      errEl.textContent = 'Erreur réseau, réessaie.';
      errEl.style.display = 'block';
    }
  }

  // ──────────────────────────────────────────────────────────────────────────
  // Data fetching
  // ──────────────────────────────────────────────────────────────────────────
  async function loadCurrent() {
    try {
      const res = await fetch('/api/catch/current');
      const data = await res.json();
      render(data.catch, data.items || []);
    } catch {
      app.innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>Erreur de chargement.</p></div>`;
    }
  }

  async function pollStock() {
    if (!currentCatch) return;
    try {
      const res = await fetch(`/api/catch/${currentCatch.id}/stock`);
      const data = await res.json();
      if (!data.items) return;

      data.items.forEach(serverItem => {
        const local = currentItems.find(i => i.id === serverItem.id);
        if (!local) return;
        local.remaining = serverItem.remaining;
        if (local.remaining <= 0) {
          const btnEl = $(`#reserve-btn-${serverItem.id}`);
          if (btnEl) {
            btnEl.disabled = true;
            btnEl.textContent = 'Épuisé 🚫';
            btnEl.className = 'btn btn-secondary btn-sm';
          }
        }
      });
    } catch {}
  }

  // Initial load + polling every 10 s
  loadCurrent();
  setInterval(pollStock, 10000);

  // ──────────────────────────────────────────────────────────────────────────
  // PWA — Push notifications
  // ──────────────────────────────────────────────────────────────────────────
  async function initPush() {
    if (!('Notification' in window) || !('serviceWorker' in navigator)) return;

    const res = await fetch('/api/push/vapid-public-key');
    const { publicKey } = await res.json();
    if (!publicKey) return;

    const pushBtn = $('#push-btn');
    pushBtn.style.display = 'inline-flex';

    const reg = await navigator.serviceWorker.ready;
    const existing = await reg.pushManager.getSubscription();

    if (existing) {
      pushBtn.textContent = '🔔 Notifs activées';
      pushBtn.disabled = true;
      return;
    }

    pushBtn.addEventListener('click', async () => {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        showToast('Permission refusée pour les notifications.', 'error');
        return;
      }
      try {
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey),
        });
        await fetch('/api/push/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ subscription: sub }),
        });
        pushBtn.textContent = '🔔 Notifs activées';
        pushBtn.disabled = true;
        showToast('Notifications activées ! 🎣', 'success');
      } catch (err) {
        showToast('Erreur lors de l\'activation.', 'error');
        console.error(err);
      }
    });
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
  }

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(() => initPush())
      .catch(console.error);
  }
  </script>
</body>
</html>
