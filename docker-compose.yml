services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fishcall:latest
    container_name: fishcall
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_DIR=/data
      - UPLOADS_DIR=/app/public/uploads
    volumes:
      - fishcall_data:/data
      - fishcall_uploads:/app/public/uploads
      - fishcall_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/catch/current"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  fishcall_data:
    driver: local
  fishcall_uploads:
    driver: local
  fishcall_logs:
    driver: local
